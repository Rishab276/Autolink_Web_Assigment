{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Vehicle | AutoLink</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
       background: url("https://img.freepik.com/premium-photo/car-is-waiting-sale-used-car-shop-background_85347-2663.jpg") no-repeat center center fixed;
            background-size: cover;
      background-size: cover;
      font-family: "Poppins", sans-serif;
      color: white;
      min-height: 100vh;
    }

    .upload-container {
      background: rgba(0, 0, 0, 0.75);
      padding: 40px;
      border-radius: 15px;
      max-width: 750px;
      margin: 100px auto;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
    }

    h2 {
      text-align: center;
      color: #ffa500;
      font-weight: 700;
      margin-bottom: 25px;
    }

    label {
      font-weight: 500;
      margin-top: 10px;
      color: #ffcc70;
    }

    input, select, textarea {
      background-color: rgba(255, 255, 255, 0.9) !important;
      color: #000 !important;
      border: none;
      border-radius: 6px;
    }

    .form-control:focus {
      border-color: #ffa500;
      box-shadow: 0 0 5px #ffa500;
    }

    .btn-upload {
      background-color: #ffa500;
      border: none;
      color: black;
      font-weight: bold;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      transition: 0.3s ease;
      margin-top: 15px;
    }

    .btn-upload:hover {
      background-color: #cc8500;
      color: #fff;
    }

    .note {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 10px;
      color: #cccccc;
    }
    nav {
        padding: 8px 40px !important; 
        }

    nav .logo-container img {
        height: 30px !important; 
        }

    nav .logo-container span {
        font-size: 18px !important;
        }

    nav ul li a {
         font-size: 15px !important; 
        padding: 5px 0 !important;
        }
  </style>
</head>
<body>
  {% include 'nav.html' %}

  <div class="upload-container">
    <h2>Upload Your Vehicle</h2>
    <form>
      
      <div class="mb-3">
        <label for="title">Vehicle Title</label>
        <input type="text" id="title" class="form-control" placeholder="e.g., Car, Van, Bus, Motocycle" required />
      </div>

     
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="make">Make</label>
          <input type="text" id="make" class="form-control" placeholder="e.g., Toyota" required />
        </div>
        <div class="col-md-6 mb-3">
          <label for="model">Model</label>
          <input type="text" id="model" class="form-control" placeholder="e.g., Corolla" required />
        </div>
      </div>

      
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="year">Year</label>
          <input type="number" id="year" class="form-control" placeholder="e.g., 2020" required />
        </div>
        <div class="col-md-6 mb-3">
          <label for="price">Price (Rs)</label>
          <input type="number" id="price" class="form-control" placeholder="e.g., 550000" required />
          
        </div>
        <div class="col-md-6 mb-3">
            <label for="condition">Condition(over 10)</label>
            <input type="number" id="condition" class="form-control" placeholder="e.g.,3 or 9" required />
        </div>

      </div>

      
      <div class="mb-3">
        <label for="type">Vehicle Type</label>
        <select id="type" class="form-select" required>
          <option value="">Select Option</option>
          <option value="sale">For Sale</option>
          <option value="rent">For Rent</option>
        </select>
      </div>

      
      <div class="mb-3">
        <label for="description">Description</label>
        <textarea id="description" class="form-control" rows="4" placeholder="Describe your vehicle..." required></textarea>
      </div>

     
      <div class="mb-3">
        <label for="contact">Contact Number</label>
        <input type="tel" id="contact" class="form-control" placeholder="e.g., 58012345" required />
      </div>

      
      <div class="mb-3">
        <label for="images">Upload Your Vehicle Images</label>
        <input type="file" id="images" class="form-control" multiple required />
        <small class="note">You can upload multiple images</small>
      </div>

      
      <button type="submit" class="btn-upload">Submit Vehicle</button>
    </form>
  </div>

  {% include 'footer.html' %}
</body>
</html>
