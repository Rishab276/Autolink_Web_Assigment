{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    <link rel="stylesheet" href="{% static 'css/review.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    {% include "nav.html" %}
    
    <main>
        <section class="hero">
            <div class="form-card">
                <div class="stars" id="starRating">
                    <span data-value="1">★</span>
                    <span data-value="2">★</span>
                    <span data-value="3">★</span>
                    <span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>

                <!-- ADDED ID HERE -->
                <form id="reviewForm" method="POST" action="{% url 'reviews:submit_review_html' %}">
                    {% csrf_token %}
                    <input type="hidden" name="rating" id="ratingValue" value="0">
                    
                    <div class="form-group form-group-title">
                        <input type="text" name="title" placeholder="Review Title" required>
                    </div>

                    <div class="form-group form-group-review">
                        <textarea name="review_text" placeholder="Write your review..." required></textarea>
                    </div>

                    <div class="form-group form-group-details">
                        <input type="text" name="author_name" placeholder="Your Name" required style="margin-bottom: 15px;">
                        <input type="email" name="email" placeholder="Your Email" required>
                    </div>

                    <button type="submit">Post Review</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        {% include "footer.html" %}
    </footer>
    
    <!-- LINK YOUR JAVASCRIPT FILE BELOW -->
    <script src="{% static 'js/review_jquery_ajax.js' %}"></script>

</body>
</html>
